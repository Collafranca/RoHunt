paths:
  /v1/me/auth/discord/callback:
    get:
      operationId: getMeAuthDiscordCallback
      tags: [Me]
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Invalid query parameters
  /v1/me/auth/me:
    get:
      operationId: getMeAuthMe
      tags: [Me]
      responses:
        "200":
          description: OK
        "401":
          description: Authentication required
  /v1/me/auth/logout:
    post:
      operationId: postMeAuthLogout
      tags: [Me]
