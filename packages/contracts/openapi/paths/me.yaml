paths:
  /v1/me/auth/discord/callback:
    get:
      operationId: getMeAuthDiscordCallback
      tags: [Me]
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Invalid query parameters
  /v1/me/auth/me:
    get:
      operationId: getMeAuthMe
      tags: [Me]
      responses:
        "200":
          description: OK
        "401":
          description: Authentication required
  /v1/me/auth/logout:
    post:
      operationId: postMeAuthLogout
      tags: [Me]
      responses:
        "200":
          description: OK
        "401":
          description: Authentication required
  /v1/me/saved-jobs:
    get:
      operationId: getMeSavedJobs
      tags: [Me]
      responses:
        "200":
          description: OK
  /v1/me/notifications:
    get:
      operationId: getMeNotifications
      tags: [Me]
      responses:
        "200":
          description: OK
  /v1/me/background-check:
    get:
      operationId: getMeBackgroundCheck
      tags: [Me]
      responses:
        "200":
          description: OK
  /v1/me/portfolio-reviews:
    get:
      operationId: getMePortfolioReviews
      tags: [Me]
      responses:
        "200":
          description: OK
  /v1/me/settings:
    get:
      operationId: getMeSettings
      tags: [Me]
      responses:
        "200":
          description: OK
