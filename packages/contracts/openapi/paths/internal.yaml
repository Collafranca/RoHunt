paths:
  /v1/internal/ingest/jobs:
    post:
      operationId: postInternalIngestJobs
      tags: [Internal]
      responses:
        "202":
          description: Accepted
        "401":
          description: Unauthorized (invalid signature, stale timestamp, or nonce replay)
        "403":
          description: Forbidden (insufficient internal scope)
  /v1/internal/notify/dispatch:
    post:
      operationId: postInternalNotifyDispatch
      tags: [Internal]
      responses:
        "202":
          description: Accepted
        "401":
          description: Unauthorized (invalid signature, stale timestamp, or nonce replay)
        "403":
          description: Forbidden (insufficient internal scope)
  /v1/internal/checks/lookup:
    post:
      operationId: postInternalChecksLookup
      tags: [Internal]
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized (invalid signature, stale timestamp, or nonce replay)
        "403":
          description: Forbidden (insufficient internal scope)
