                        type: string
                  requestId:
                    type: string
  /v1/public/references:
    get:
      operationId: getPublicReferences
      tags: [Public]
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: cursor
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: source
          required: false
