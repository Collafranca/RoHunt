                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, title, severity, reportedAt]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        severity:
                          type: string
                        reportedAt:
