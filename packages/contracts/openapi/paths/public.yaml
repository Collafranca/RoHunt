                          severity:
                            type: string
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                type: object
                required: [error, requestId]
                properties:
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
