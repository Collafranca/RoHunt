                      message:
                        type: string
                  requestId:
                    type: string
  /v1/public/status:
    get:
      operationId: getPublicStatus
      tags: [Public]
      responses:
        "200":
          description: Public API status
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [ok, service, version]
                    properties:
                      ok:
                        type: boolean
                      service:
                        type: string
                      version:
                        type: string
                  meta:
                    type: object
                    required: [generatedAt]
                    properties:
                      generatedAt:
                        type: string
                        format: date-time
