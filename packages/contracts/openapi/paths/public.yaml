paths:
  /v1/public/jobs:
    get:
      operationId: getPublicJobs
      tags: [Public]
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: cursor
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: type
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated public jobs
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, title, type, location, postedAt]
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        type:
                          type: string
                        location:
                          type: string
                        postedAt:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    required: [pagination, filters]
                    properties:
                      pagination:
                        type: object
                        required: [limit, cursor, nextCursor, total]
                        properties:
                          limit:
                            type: integer
                          cursor:
                            type: integer
                          nextCursor:
                            oneOf:
                              - type: integer
                              - type: "null"
                          total:
                            type: integer
                      filters:
                        type: object
                        properties:
                          type:
                            type: string
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                type: object
                required: [error, requestId]
                properties:
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                  requestId:
                    type: string
